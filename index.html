<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Town</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    overflow: hidden;
    height: 100%;
  }
  #game-container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
  }
  canvas {
    image-rendering: pixelated;
  }
  #directory-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    font-family: 'Courier New', monospace;
  }
  #directory-overlay[hidden] {
    display: none;
  }
  .directory-panel {
    background: #1a1a1a;
    border: 2px solid #f0d878;
    padding: 24px 32px;
    max-width: 360px;
    color: #f0f0f0;
  }
  .directory-panel h1 {
    margin: 0 0 8px;
    font-size: 20px;
    color: #f0d878;
  }
  .directory-hint {
    margin: 0 0 16px;
    font-size: 12px;
    color: #999;
  }
  .directory-panel ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .directory-panel li {
    margin-bottom: 8px;
  }
  .directory-panel a {
    color: #7fd1ff;
    text-decoration: none;
    font-size: 14px;
  }
  .directory-panel a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<div id="game-container"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
